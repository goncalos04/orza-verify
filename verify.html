<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed – Orza</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #5b62f4 0%, #6c7bf7 100%);
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 60px -20px rgba(26,26,46,0.35);
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .logo img { width: 28px; height: 28px; }
    .logo span {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.5px;
      color: #5b62f4;
    }
    .check {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #e6f4ea;
      color: #2f9e56;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check svg { width: 28px; height: 28px; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #7a7a90;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    a.home {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      color: #5b62f4;
      text-decoration: none;
    }
    a.home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="assets/icon/app_icon.png" alt="Orza logo" />
      <span>ORZA</span>
    </div>
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 13 10 18 19 7"></polyline>
      </svg>
    </div>
    <h1>Email confirmed!</h1>
    <p>You may now close this page and return to the Orza app.</p>
    <a class="home" href="index.html">Visit orza.pt &rarr;</a>
  </div>
</body>
</html>
