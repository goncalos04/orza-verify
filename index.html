<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orza – Personal Budget Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f13;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 20px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
    }
    .logo span { color: #7c6af7; }
    p {
      font-size: 16px;
      color: #9a9ab0;
      margin-top: 12px;
      line-height: 1.6;
    }
    .links {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      color: #7c6af7;
      text-decoration: none;
      font-size: 15px;
    }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">orza<span>.</span></div>
    <p>Personal budget manager with end-to-end encryption.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="delete-account.html">Delete Account</a>
    </div>
  </div>
</body>
</html>
